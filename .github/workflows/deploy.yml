name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME_BACKEND: simple-app-backend
  IMAGE_NAME_FRONTEND: simple-app-frontend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm test 2>&1 || echo "Tests skipped or completed"

  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,paDOCKER_USERNAMEversion}}
            type=semver,pattern={{major}}.{{minor}}
            latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,paDOCKER_USERNAMEversion}}
            type=semver,pattern={{major}}.{{minor}}
            latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VM
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
          set -e
          echo "🚀 Deploying application..."
          
          # Navigate to project directory
          cd ~/projet/final
          
          # Pull latest changes
          git pull origin main 2>/dev/null || git pull origin master 2>/dev/null || true
          
          # Build Docker images
          echo "📦 Building Docker images..."
          docker build -t simple-app-backend:latest ./backend
          docker build -t simple-app-frontend:latest ./frontend
          
          # Load images into K3s
          echo "📤 Loading images into K3s..."
          docker save simple-app-backend:latest | sudo k3s ctr images import -
          docker save simple-app-frontend:latest | sudo k3s ctr images import -
          
          # Deploy to Kubernetes
          echo "☸️ Deploying to Kubernetes..."
          sudo kubectl apply -f k8s/app-deployment.yaml
          
          # Wait for rollout
          echo "⏳ Waiting for deployments to be ready..."
          sudo kubectl rollout status deployment/backend -w --timeout=300s
          sudo kubectl rollout status deployment/frontend -w --timeout=300s
          
          echo "✅ Deployment completed successfully!"
          
          # Print pod status
          echo "📊 Pod status:"
          sudo kubectl get pods
          EOF

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
          echo "🔍 Verifying deployment..."
          sudo kubectl get deployments
          sudo kubectl get services
          echo "✅ All systems operational!"
          EOF

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "❌ Tests failed - deployment stopped"
            exit 1
          fi
          if [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ Build failed - deployment stopped"
            exit 1
          fi
          if [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "❌ Deployment failed"
            exit 1
          fi
          echo "✅ Pipeline completed successfully!"
